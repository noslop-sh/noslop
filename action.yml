name: "noslop check"
description: >-
  Recompute noslop checks against the pull request diff and reconcile them
  with the acknowledgment ledger committed in the branch. Fails when a
  blocking check has no ledger record — commits made with --no-verify
  carry no acknowledgments, so they fail here. Posts the ack table to the
  job summary.
branding:
  icon: "shield"
  color: "orange"

inputs:
  base-ref:
    description: "Base ref to diff against (defaults to the PR base branch)"
    required: false
    default: ""
  version:
    description: 'noslop version to install (crates.io), or "local" to cargo-install the checked-out source'
    required: false
    default: "latest"
  upload-url:
    description: >-
      Optional noslop cloud ingestion endpoint. When set, the versioned
      check-run payload is POSTed there (team metrics, org rulebooks,
      history). Leave empty for fully-local operation.
    required: false
    default: ""
  upload-token:
    description: "Bearer token for upload-url (store as a repository secret)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install noslop
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "local" ]; then
          cargo install --path . --locked
        elif [ "${{ inputs.version }}" = "latest" ]; then
          cargo install noslop --locked
        else
          cargo install noslop --version "${{ inputs.version }}" --locked
        fi

    - name: Resolve base ref
      id: base
      shell: bash
      run: |
        BASE="${{ inputs.base-ref }}"
        if [ -z "$BASE" ]; then
          BASE="origin/${{ github.base_ref || 'main' }}"
        fi
        git fetch --no-tags --depth=200 origin "${BASE#origin/}" || true
        echo "ref=$BASE" >> "$GITHUB_OUTPUT"

    - name: noslop check (branch diff vs ledger)
      id: check
      shell: bash
      run: |
        set +e
        NOSLOP_ACTOR=ci noslop check --ci --diff-base "${{ steps.base.outputs.ref }}" --json > noslop-check.json
        echo "status=$?" >> "$GITHUB_OUTPUT"
        set -e

        {
          echo "## noslop check"
          echo ""
          echo '```json'
          cat noslop-check.json
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload check-run payload
      if: inputs.upload-url != ''
      shell: bash
      run: |
        # The CLI is the single serializer of the envelope contract
        # (docs/SCHEMA.md): check payload verbatim + run coordinates + the
        # run's ledger records. Failures here never change the gate verdict
        # (upload is telemetry, not truth).
        noslop envelope \
          --check noslop-check.json \
          --repo "${{ github.repository }}" \
          --sha "${{ github.event.pull_request.head.sha || github.sha }}" \
          --pr "${{ github.event.pull_request.number || '' }}" \
          --base "${{ steps.base.outputs.ref }}" \
          > noslop-upload.json
        curl --fail-with-body --silent --show-error \
          -X POST \
          -H "Authorization: Bearer ${{ inputs.upload-token }}" \
          -H "Content-Type: application/json" \
          --data @noslop-upload.json \
          "${{ inputs.upload-url }}" \
          || echo "::warning::noslop upload failed (gate verdict unaffected)"

    - name: Gate verdict
      shell: bash
      run: exit "${{ steps.check.outputs.status }}"
