# noslop checks

[project]
prefix = "NOS"

[[check]]
id = "NOS-1"
target = "src/adapters/git/hooks.rs"
message = "Verify hook installation preserves permissions"
severity = "block"

[[check]]
id = "NOS-2"
target = "src/core/services/checker.rs"
message = "Verify acknowledgment matching logic correctness"
severity = "block"

[[check]]
id = "NOS-3"
target = ".github/workflows/"
message = "When modifying GitHub Actions workflows, ensure docs/CI_CD.md is updated to reflect any changes"
severity = "warn"

[[check]]
id = "NOS-4"
target = "Cargo.toml"
message = "Dependency change: full build passes and no unused deps remain"
severity = "block"

[[check]]
id = "NOS-5"
target = "tests/unit.rs"
message = "Test module list matches the files present in tests/unit/"
severity = "warn"

[[check]]
id = "NOS-6"
target = "src/cli/**"
message = "CLI surface changed: README commands section and help text still accurate?"
severity = "warn"

[[check]]
id = "NOS-7"
target = "CLAUDE.md"
message = "New convention documented: add a matching noslop check if it should be enforced"
severity = "warn"

[[check]]
id = "NOS-8"
target = "docs/SCHEMA.md"
message = "Schema formats changed? Bump schema version and add a migration note"
severity = "block"

[[check]]
id = "NOS-9"
target = "src/cli/**/*"
message = "`src/cli/` — clap app + command handlers. CLI must call core services, never reimplement their logic."
severity = "block"

[[check]]
id = "NOS-10"
target = "src/**/*.rs"
message = "No dead code: `#![allow(dead_code)]` is banned; delete unused code instead of parking it."
severity = "warn"

[[check]]
id = "NOS-11"
target = "src/**/*.rs"
message = "No compat shims or speculative abstractions: one implementation per port until a second consumer exists."
severity = "warn"

[[check]]
id = "NOS-12"
target = "src/core/**/*.rs"
message = "Does this core code stay pure domain logic with no I/O?"
severity = "block"

[[check]]
id = "NOS-13"
target = "src/**/*.rs"
message = "Does new logic added in this change include tests?"
severity = "block"

[[check]]
id = "NOS-14"
target = "src/**/*.rs"
message = "If this change alters behavior, did you update the affected tests in the same commit?"
severity = "warn"

[[check]]
id = "NOS-15"
target = "src/adapters/**/*.rs"
message = "If this change breaks a versioned schema (ack ledger or check-run payload), did you bump the schema version?"
severity = "block"

